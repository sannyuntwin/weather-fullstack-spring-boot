# Spring Boot Application Configuration

# Server Configuration
server.port=8080

# OpenWeather API Configuration
# IMPORTANT: Replace YOUR_API_KEY_HERE with your actual OpenWeather API key
# Get your free API key from: https://openweathermap.org/api
openweather.api.key=${OPENWEATHER_API_KEY}
openweather.api.base.url=https://api.openweathermap.org/data/2.5/weather

# CORS Configuration
# Allow React frontend running on localhost:5173 to access this API
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging Configuration
logging.level.com.example.weatherapi=DEBUG
